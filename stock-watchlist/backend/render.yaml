databases:
  - name: tickervault-db
    databaseName: tickervault
    user: admin
    plan: free
    region: oregon

services:
  - type: web
    name: tickervault-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tickervault-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL after deploying frontend
      - key: PYTHON_VERSION
        value: 3.12.0
